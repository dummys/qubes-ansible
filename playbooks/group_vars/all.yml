# group_vars all.yml

# Dom0 Admin User
admin_user: glecoz
admin_group: "{{ admin_user }}"
admin_home: "/home/{{ admin_user }}"
bin_folder: "{{ admin_home }}/bin"

# VM user
vm_user: user
vm_group: user
vm_user_home: "/home/{{ vm_user }}"
vm_user_documents: "/home/{{ vm_user }}/Documents"

# Network
netvm_default: disp-sys-vpn-proton-ch
#netvm_default: sys-firewall

# VM Bind dir file
binds_dir: /rw/config/qubes-bind-dirs.d
binds_file: "{{ binds_dir }}/50_user.conf"

# Config files
rc_local: /rw/config/rc.local

# Dom0 user networking policy file
networking_policy_file: /etc/qubes/policy.d/30-user-networking.policy

# Debian base version for templates
debian_version: 13
