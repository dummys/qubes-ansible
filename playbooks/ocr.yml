---
#
# Template
#
- hosts: local
  connection: local
  vars_files:
    - vars/ocr.yml
  tasks:
    - include_tasks: tasks/clone_template.yml
      vars:
        clone_src: "{{ ocr_base_template }}"
        clone_dest: "{{ host_ocr_template }}"

- hosts: "{{ host_ocr_template | default([]) }}"
  become: yes
  connection: qubes
  vars_files:
    - vars/ocr.yml
  roles:
    - role: base_packages
    - role: ocr_template

- hosts: local
  connection: local
  vars_files:
    - vars/ocr.yml
  tasks:
    - name: Shutdown the OCR Template
      qubesos:
        guest: "{{ host_ocr_template }}"
        state: shutdown

#
# DVM
#
- hosts: local
  connection: local
  vars_files:
    - vars/ocr.yml
  tasks:
    - name: Check if DVM exists
      shell: "qvm-ls --raw-data --fields name | grep -w {{ host_ocr_dvm }}"
      register: dvm_check
      failed_when: false
      changed_when: false
    - name: Create DVM
      command: qvm-create --class AppVM --label blue --template {{ host_ocr_template }} {{ host_ocr_dvm }}
      when: dvm_check.rc != 0
    - name: Set DVM label
      command: qvm-prefs {{ host_ocr_dvm }} label blue
    - name: Set DVM network
      command: qvm-prefs {{ host_ocr_dvm }} netvm {{ netvm_default }}
    - name: Set as DispVM template
      command: qvm-prefs {{ host_ocr_dvm }} template_for_dispvms true
    - name: Resize private volume
      command: qvm-volume resize {{ host_ocr_dvm }}:private 20GB
      when: dvm_check.rc != 0
    - include_role:
        name: set_prefs
      tags: [prefs]
      vars:
        target_vm: "{{ host_ocr_dvm }}"
        vm_qrexec_timeout: "{{ qrexec_timeout_default }}"

- hosts: "{{ host_ocr_dvm | default([]) }}"
  connection: qubes
  vars_files:
    - vars/ocr.yml
    - vars/llm.yml
  roles:
    - role: ocr_dvm

- hosts: local
  connection: local
  vars_files:
    - vars/ocr.yml
  tasks:
    - name: Shutdown the OCR DVM
      qubesos:
        guest: "{{ host_ocr_dvm }}"
        state: shutdown

#
# DispVM
#
- hosts: local
  connection: local
  vars_files:
    - vars/ocr.yml
  tasks:
    - name: Check if DispVM exists
      shell: "qvm-ls --raw-data --fields name | grep -w {{ ocr_dispvm }}"
      register: dispvm_check
      failed_when: false
      changed_when: false
    - name: Create DispVM
      command: qvm-create --class DispVM --label red --template {{ host_ocr_dvm }} {{ ocr_dispvm }}
      when: dispvm_check.rc != 0
    - name: Set default DVM
      command: qvm-prefs {{ ocr_dispvm }} default_dispvm {{ host_ocr_dvm }}
    - name: Set label
      command: qvm-prefs {{ ocr_dispvm }} label red
    - name: Set network
      command: qvm-prefs {{ ocr_dispvm }} netvm {{ netvm_default }}
    - include_role:
        name: set_prefs
      tags: [prefs]
      vars:
        target_vm: "{{ ocr_dispvm }}"
        vm_qrexec_timeout: "{{ qrexec_timeout_default }}"

#
# Networking — OCR DispVM → LLM DispVM
#
- hosts: local
  become: yes
  connection: local
  vars_files:
    - vars/ocr.yml
    - vars/llm.yml
  tasks:
    - name: Ensure network policy file exists
      file:
        path: "{{ networking_policy_file }}"
        owner: root
        group: qubes
        mode: '0664'
        state: touch
    - name: Set network policy for OCR → LLM
      lineinfile:
        path: "{{ networking_policy_file }}"
        regexp: "{{ llm_tcp_port }}.*{{ ocr_dispvm }}"
        line: "qubes.ConnectTCP +{{ llm_tcp_port }} {{ ocr_dispvm }} @default allow target={{ llm_dispvm }}"
        state: present

#
# Networking — Data VM → OCR DispVM (disabled)
#
- hosts: local
  become: yes
  connection: local
  vars_files:
    - vars/ocr.yml
  tasks:
    - name: Ensure network policy file exists
      when: 0 > 1
      file:
        path: "{{ networking_policy_file }}"
        owner: root
        group: qubes
        mode: '0664'
        state: touch
    - name: Set network policy for Data → OCR
      when: 0 > 1
      lineinfile:
        path: "{{ networking_policy_file }}"
        regexp: "{{ ocr_tcp_port }}.*{{ ocr_dispvm }}"
        line: "qubes.ConnectTCP +{{ ocr_tcp_port }} {{ host_ocr_data }} @default allow target={{ ocr_dispvm }}"
        state: present

- hosts: "{{ host_ocr_data | default([]) }}"
  become: yes
  connection: qubes
  vars_files:
    - vars/ocr.yml
  tasks:
    - name: Set connection to OCR at startup
      when: 0 > 1
      lineinfile:
        path: "{{ rc_local }}"
        regexp: "qvm-connect-tcp.*{{ ocr_tcp_port }}"
        line: "qvm-connect-tcp {{ ocr_tcp_port }}:@default:{{ ocr_tcp_port }}"
        state: present
