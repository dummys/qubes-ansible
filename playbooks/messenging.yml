---
- hosts: local
  connection: local
  tasks:
    - name: Create a template for messenging VM
      qubesos:
        guest: fedora-43-xfce-messenging
        state: present
        vmtype: "TemplateVM"
        properties:
          template: "fedora-43-xfce"
          label: blue
      when: 0 > 1

- hosts: fedora-43-xfce-messenging
  connection: qubes
  tasks:
    - name: Install third party repositories
      become: yes
      yum:
        name: fedora-workstation-repositories
        state: present
    - name: Enable Google Chrome repository
      become: yes
      command:
        cmd: dnf config-manager setopt google-chrome.enabled=1 
    - name: Install Chrome (used for Teams)
      become: yes
      yum:
        name: google-chrome-stable
        state: present
    - name: Install SNAP
      become: yes
      yum:
        name: snapd
        state: present
    - name: Create SNAP Symlink
      become: yes
      file:
        src: /var/lib/snapd/snap
        dest: /snap
        state: link
    - name: Reboot after SNAP installation
      reboot:
        reboot_timeout: 300
    - name: Install Snap Signal
      become: yes
      community.general.snap:
        name: signal-desktop
        state: present
    - name: Install Snap Whatsie
      become: yes
      community.general.snap:
        name: whatsie
        state: present

- hosts: local
  connection: local
  tasks:
    - name: Create messenging AppVM
      qubesos:
        guest: messenging
        state: present
        properties:
          template: "fedora-43-xfce-messenging"
          label: blue
          netvm: "disp-sys-vpn-proton-ch"

- hosts: messenging
  connection: qubes
  tasks:
    - name: Make sure autostart folder exists
      file:
        path: "/rw/home/user/.config/autostart"
        state: directory
        mode: 0755
    - name: Create autostart Signal symlink
      file:
        src: "/var/lib/snapd/desktop/applications/signal-desktop_signal-desktop.desktop"
        dest: "/rw/home/user/.config/autostart/signal.desktop"
        state: link
    - name: Create autostart Whatsie symlink
      file:
        src: "/var/lib/snapd/desktop/applications/whatsie_whatsie.desktop"
        dest: "/rw/home/user/.config/autostart/whatsie.desktop"
        state: link
    - name: Create autostart Google Chrome symlink
      file:
        src: "/usr/share/applications/google-chrome.desktop"
        dest: "/rw/home/user/.config/autostart/google-chrome.desktop"
        state: link
