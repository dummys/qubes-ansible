---
- name: Clone project
  ansible.builtin.git:
    repo: "https://github.com/ahnafnafee/local-llm-pdf-ocr"
    dest: "{{ vm_user_documents }}/local-llm-pdf-ocr"
    force: true

- name: Install UV
  ansible.builtin.pip:
    name: uv
    virtualenv: "{{ vm_user_documents }}/local-llm-pdf-ocr"
    virtualenv_command: "{{ ansible_python.executable }} -m venv"
    state: present

- name: Fetch dependencies
  ansible.builtin.shell:
    chdir: "{{ vm_user_documents }}/local-llm-pdf-ocr"
    cmd: "source bin/activate && uv sync --extra web"
    executable: /bin/bash

- name: Copy .env file
  ansible.builtin.copy:
    src: ".env"
    dest: "{{ vm_user_documents }}/local-llm-pdf-ocr/"
    owner: "{{ vm_user }}"
    group: "{{ vm_group }}"
    mode: '0644'

- name: Copy start script file
  ansible.builtin.copy:
    src: "start.sh"
    dest: "{{ vm_user_documents }}/local-llm-pdf-ocr/"
    owner: "{{ vm_user }}"
    group: "{{ vm_group }}"
    mode: '0755'

- name: Set connection to LLM VM at startup
  become: yes
  lineinfile:
    path: "{{ rc_local}}"
    regexp: "qvm-connect-tcp.*{{ llm_tcp_port }}"
    line: "qvm-connect-tcp {{ llm_tcp_port }}:@default:{{ llm_tcp_port }}"
    state: present

- name: Start the OCR server at startup
  become: yes
  lineinfile:
    path: "{{ rc_local}}"
    regexp: "start.sh"
    line: "su user -c '{{ vm_user_documents }}/local-llm-pdf-ocr/start.sh'"
    state: present
