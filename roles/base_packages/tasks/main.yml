---
- name: Load OS-specific package variables
  include_vars: "{{ ansible_os_family }}.yml"

- name: Update system (Debian)
  apt:
    upgrade: dist
    update_cache: yes
  become: yes
  when: ansible_os_family == 'Debian'

- name: Install base packages (Debian)
  apt:
    name: "{{ base_packages + base_packages_extra }}"
    state: present
  become: yes
  when: ansible_os_family == 'Debian'

- name: Update system (RedHat)
  dnf:
    name: "*"
    state: latest
  become: yes
  when: ansible_os_family == 'RedHat'

- name: Install base packages (RedHat)
  dnf:
    name: "{{ base_packages + base_packages_extra }}"
    state: present
  become: yes
  when: ansible_os_family == 'RedHat'
