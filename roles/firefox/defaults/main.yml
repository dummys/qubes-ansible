---
# Extensions always force-installed (user cannot remove)
firefox_base_extensions:
  "uBlock0@raymondhill.net":
    installation_mode: force_installed
    install_url: "https://addons.mozilla.org/firefox/downloads/latest/ublock-origin/latest.xpi"
  "{d10d0bf8-f5b5-c8b4-a8b2-2b9879e08c5d}":
    installation_mode: force_installed
    install_url: "https://addons.mozilla.org/firefox/downloads/latest/adblock-plus/latest.xpi"

# Optional extensions catalog — reference by key in firefox_extra_extensions
firefox_available_extra_extensions:
  print_edit_we:
    install_url: "https://addons.mozilla.org/firefox/downloads/latest/print-edit-we/latest.xpi"
  fireshot:
    install_url: "https://addons.mozilla.org/firefox/downloads/latest/fireshot/latest.xpi"
  multi_account_containers:
    install_url: "https://addons.mozilla.org/firefox/downloads/latest/multi-account-containers/latest.xpi"
  temporary_containers:
    install_url: "https://addons.mozilla.org/firefox/downloads/latest/temporary-containers/latest.xpi"
  facebook_container:
    install_url: "https://addons.mozilla.org/firefox/downloads/latest/facebook-container/latest.xpi"
  google_container:
    install_url: "https://addons.mozilla.org/firefox/downloads/latest/google-container/latest.xpi"
  cookies_txt:
    install_url: "https://addons.mozilla.org/firefox/downloads/latest/get-cookies-txt-locally/latest.xpi"

# Set in a playbook to pre-install optional extensions (user can remove them)
# Example: firefox_extra_extensions: [multi_account_containers, facebook_container]
firefox_extra_extensions: []
