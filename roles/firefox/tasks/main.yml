---
- name: Install Firefox (Debian)
  ansible.builtin.apt:
    name: firefox-esr
    state: present
  become: yes
  when: ansible_os_family == 'Debian'

- name: Install Firefox (RedHat)
  ansible.builtin.dnf:
    name: firefox
    state: present
  become: yes
  when: ansible_os_family == 'RedHat'

- name: Set Firefox distribution path
  ansible.builtin.set_fact:
    firefox_dist_path: "{{ '/usr/lib/firefox-esr/distribution' if ansible_os_family == 'Debian' else '/usr/lib/firefox/distribution' }}"

- name: Create Firefox distribution directory
  ansible.builtin.file:
    path: "{{ firefox_dist_path }}"
    state: directory
    mode: '0755'
  become: yes

- name: Build extra extension install URL list
  ansible.builtin.set_fact:
    _firefox_extra_install_urls: >-
      {{
        firefox_extra_extensions
        | map('extract', firefox_available_extra_extensions)
        | map(attribute='install_url')
        | list
      }}

- name: Build Firefox policies document
  ansible.builtin.set_fact:
    _firefox_policies:
      policies:
        DontCheckDefaultBrowser: true
        OverrideFirstRunPage: ""
        OverridePostUpdatePage: ""
        DisableTelemetry: true
        Homepage:
          URL: "https://duckduckgo.com"
          Locked: false
          StartPage: "homepage"
        ExtensionSettings: "{{ firefox_base_extensions }}"
        Extensions:
          Install: "{{ _firefox_extra_install_urls }}"

- name: Deploy Firefox policies
  ansible.builtin.copy:
    content: "{{ _firefox_policies | to_nice_json }}\n"
    dest: "{{ firefox_dist_path }}/policies.json"
    mode: '0644'
  become: yes

- name: Create Firefox skel profile directory
  ansible.builtin.file:
    path: /etc/skel/.mozilla/firefox/default
    state: directory
    mode: '0755'
  become: yes

- name: Deploy Firefox profiles.ini to skel
  ansible.builtin.copy:
    src: profiles.ini
    dest: /etc/skel/.mozilla/firefox/profiles.ini
    mode: '0644'
  become: yes

- name: Deploy Firefox user.js to skel profile
  ansible.builtin.copy:
    src: user.js
    dest: /etc/skel/.mozilla/firefox/default/user.js
    mode: '0644'
  become: yes
