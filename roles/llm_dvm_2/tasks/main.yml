      FROM qwen3:14b
      PARAMETER num_ctx 32768
      PARAMETER temperature 0.3
- name: Create the new model
  command:
    cmd: "ollama create qwen3:14b-32k -f /tmp/Modelfile.custom"
- name: Pull Qwen 3 VL 8b model
  command:
    cmd: ollama pull qwen3-vl:8b
- name: Create a version of the model Qwen 3 VL 8b with a 32K context window
  ansible.builtin.copy:
    dest: /tmp/Modelfile.custom
    content: |
      FROM qwen3-vl:8b
      PARAMETER num_ctx 32768
      PARAMETER temperature 0.3
- name: Create the new model
  command:
    cmd: "ollama create qwen3-vl:8b-32k -f /tmp/Modelfile.custom"
